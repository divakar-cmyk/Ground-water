# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── MySQL DataSource ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:groundwater_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP — Spring Boot default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
# Fail fast if pool cannot get a connection — 5 s matches the pre-check timeout
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.initialization-fail-timeout=1

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# "update" creates/alters tables automatically — switch to "validate" in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── Jackson ──────────────────────────────────────────────────────────────────
# Return LocalDateTime as ISO-8601 string, not a timestamp array
spring.jackson.serialization.write-dates-as-timestamps=false
